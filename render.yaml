services:
  - type: web
    name: execution-protocol-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_SEPOLIA_RPC
        value: https://sepolia.base.org
      - key: ATTEST_CONTRACT_ADDRESS
        value: 0xC36E784E1dff616bDae4EAc7B310F0934FaF04a4
      - key: FEE_COLLECTOR_ADDRESS
        value: 0xFF196F1e3a895404d073b8611252cF97388773A7
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: execution-protocol-docs
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: ./docs-site
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /docs/*
        destination: /docs/index.html
      - type: rewrite
        source: /api/*
        destination: /api/index.html
      - type: rewrite
        source: /contracts/*
        destination: /contracts/index.html
